name: LegendaryWeapons
version: '${project.version}'
main: dev.legendary.LegendaryWeapons
api-version: '1.21'
description: Soulslike legendary weapons - Darkin Blade, Frostmourne, Excalibur, Mjolnir
authors: [legendary]

commands:
  giveweapon:
    description: Give a legendary weapon
    usage: /giveweapon <player> <weapon>
    permission: legendary.give

permissions:
  legendary.give:
    description: Allows giving legendary weapons
    default: op
